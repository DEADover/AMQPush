name: Release

# Triggered by pushing a `v*` tag (e.g. `v1.2.0`). Builds AMQPush in release
# mode on macOS (Intel + ARM universal), Windows (x64) and Linux (x64) and
# attaches the artefacts to a single GitHub Release.
#
# Manual trigger via Actions tab is also supported (workflow_dispatch) for
# debugging — when run that way the produced installers are uploaded as job
# artefacts but no GH Release is created.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needed so tauri-action can create / upload to a Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — single job builds a universal (Intel + ARM) bundle.
          - platform: macos-latest
            rust_target: universal-apple-darwin
            tauri_args: '--target universal-apple-darwin'
            label: macos

          # Windows x64 — produces .msi (WiX) and .exe (NSIS) installers.
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ''
            label: windows

          # Linux x64 — produces .deb (Debian/Ubuntu) and .AppImage (portable).
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ''
            label: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal target needs both arches available.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.rust_target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          # Bust cache when target changes between matrix runs.
          key: ${{ matrix.label }}

      # Linux only — Tauri 2 needs WebKitGTK, glib, etc. for runtime + bundling.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build & bundle (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # When building from a `v*` tag push, tauri-action automatically
          # creates / updates a Release with this tag and uploads the
          # platform's installers as assets.
          tagName: ${{ github.ref_name }}
          releaseName: 'AMQPush ${{ github.ref_name }}'
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for changes in this release.

            **Downloads:**
            - **macOS** (Intel + Apple Silicon universal) — `AMQPush_*_universal.dmg`
            - **Windows** (x64) — `AMQPush_*_x64-setup.exe` (NSIS) or `AMQPush_*_x64_en-US.msi` (MSI)
            - **Linux** (x64) — `AMQPush_*_amd64.deb` (Debian/Ubuntu) or `AMQPush_*_amd64.AppImage` (portable)

            > Binaries are not code-signed — macOS Gatekeeper / Windows SmartScreen will warn on first launch. On macOS, right-click the app → Open → confirm. On Windows, click "More info" → "Run anyway".
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}

      # When run via workflow_dispatch (no tag), tauri-action does NOT create a
      # release — instead, upload installers as run artefacts so they can still
      # be inspected.
      - name: Upload artefacts (manual run only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: amqpush-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
          if-no-files-found: warn
          retention-days: 14
