<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="AMQPush — AMQP 1.0 desktop client">
  <!-- ── Background: dark navy with a soft brand-colour glow ───────────── -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0e1622"/>
      <stop offset="100%" stop-color="#1a2638"/>
    </linearGradient>
    <radialGradient id="glow-y" cx="0.18" cy="0.5" r="0.35">
      <stop offset="0%"  stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-c" cx="0.85" cy="0.7" r="0.45">
      <stop offset="0%"  stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Faint message-flow lines on the right side -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)" rx="16"/>
  <rect width="1200" height="320" fill="url(#grid)" rx="16"/>
  <rect width="1200" height="320" fill="url(#glow-y)" rx="16"/>
  <rect width="1200" height="320" fill="url(#glow-c)" rx="16"/>

  <!-- ── Logo (AMQPush icon) ───────────────────────────────────────────── -->
  <image x="80" y="80" width="160" height="160"
         href="data:image/png;base64,"/>

  <!-- ── Wordmark + tagline ────────────────────────────────────────────── -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <text x="280" y="170" font-size="84" font-weight="800" fill="#f8fafc" letter-spacing="-2">
      AMQPush
    </text>
    <text x="284" y="218" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="0.5">
      A modern desktop client for AMQP 1.0 brokers
    </text>

    <!-- Feature pills -->
    <g transform="translate(284, 248)">
      <g>
        <rect x="0" y="0" width="74" height="26" rx="13" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-opacity="0.4"/>
        <text x="37" y="18" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">Tauri 2</text>
      </g>
      <g transform="translate(84, 0)">
        <rect x="0" y="0" width="62" height="26" rx="13" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.4"/>
        <text x="31" y="18" font-size="12" font-weight="600" fill="#22d3ee" text-anchor="middle">Rust</text>
      </g>
      <g transform="translate(156, 0)">
        <rect x="0" y="0" width="78" height="26" rx="13" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.4"/>
        <text x="39" y="18" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">React 19</text>
      </g>
      <g transform="translate(244, 0)">
        <rect x="0" y="0" width="156" height="26" rx="13" fill="#94a3b8" fill-opacity="0.10" stroke="#94a3b8" stroke-opacity="0.35"/>
        <text x="78" y="18" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">macOS · Win · Linux</text>
      </g>
    </g>
  </g>

  <!-- ── Decorative message-flow arrows on the right ───────────────────── -->
  <g stroke="#ffffff" stroke-opacity="0.10" fill="none" stroke-width="1.5" stroke-linecap="round">
    <path d="M 820 110 L 1080 110" stroke-dasharray="6 6"/>
    <path d="M 1075 104 L 1085 110 L 1075 116" fill="#ffffff" fill-opacity="0.10"/>

    <path d="M 820 165 L 1080 165" stroke="#22d3ee" stroke-opacity="0.35" stroke-dasharray="6 6"/>
    <path d="M 1075 159 L 1085 165 L 1075 171" fill="#22d3ee" fill-opacity="0.45" stroke="none"/>

    <path d="M 820 220 L 1080 220" stroke-dasharray="6 6"/>
    <path d="M 1075 214 L 1085 220 L 1075 226" fill="#ffffff" fill-opacity="0.10"/>
  </g>

  <!-- ── Tiny "queue" icons stacked at the right end ───────────────────── -->
  <g transform="translate(1100, 80)" fill="#ffffff" fill-opacity="0.18">
    <rect x="0"  y="0"   width="60" height="14" rx="3"/>
    <rect x="0"  y="22"  width="60" height="14" rx="3" fill="#22d3ee" fill-opacity="0.5"/>
    <rect x="0"  y="44"  width="60" height="14" rx="3"/>
    <rect x="0"  y="66"  width="60" height="14" rx="3"/>
    <rect x="0"  y="88"  width="60" height="14" rx="3"/>
    <rect x="0"  y="110" width="60" height="14" rx="3" fill="#fbbf24" fill-opacity="0.5"/>
    <rect x="0"  y="132" width="60" height="14" rx="3"/>
    <rect x="0"  y="154" width="60" height="14" rx="3"/>
    <rect x="0"  y="176" width="60" height="14" rx="3"/>
  </g>
</svg>
